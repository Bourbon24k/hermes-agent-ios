name: HermesAgent
options:
  bundleIdPrefix: me.clawpilot
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "2"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  HermesAgent:
    type: application
    platform: iOS
    sources:
      - HermesAgent
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.clawpilot.hermes-agent
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_NSCameraUsageDescription: "Camera is used to scan the Hermes Link pairing QR code."
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "Local network access is used to connect to Hermes Link running on your computer."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Microphone is used for voice input."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Speech recognition is used to dictate messages."
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsArbitraryLoads: false
        SUPPORTS_MACCATALYST: false
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: HermesAgent/Info.plist
      properties:
        UILaunchScreen: {}
        UIUserInterfaceStyle: Dark
        NSCameraUsageDescription: "Camera is used to scan the Hermes Link pairing QR code."
        NSLocalNetworkUsageDescription: "Local network access is used to connect to Hermes Link running on your computer."
        NSMicrophoneUsageDescription: "Microphone is used for voice input."
        NSSpeechRecognitionUsageDescription: "Speech recognition is used to dictate messages."
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleDisplayName: Hermes
